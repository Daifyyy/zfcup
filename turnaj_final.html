<body>
<div id="root"></div>

<script type="text/babel">
// ═══════════════════════════════════════════════════════════════════════════
// JSONBIN CONFIG — vyplň vlastní hodnoty
// ═══════════════════════════════════════════════════════════════════════════
const JSONBIN_ID  = "69b30812b7ec241ddc62cf84";   // např. "6657f3e2ad19ca34f8a1b2c3"
const JSONBIN_KEY = "$2a$10$9.ysR9MT9.LDN8o8gt8Kw.GoIEMKdfFummU9qvpZE29Dlkvt/FTFu";   // např. "$2a$10$xyz..."
const BIN_URL     = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

async function remoteLoad() {
  if (JSONBIN_ID === "TVOJE_BIN_ID") return null;
  try {
    const r = await fetch(`${BIN_URL}/latest`, { headers: { "X-Master-Key": JSONBIN_KEY } });
    if (!r.ok) throw new Error();
    return (await r.json()).record;
  } catch { return null; }
}
async function remoteSave(state) {
  if (JSONBIN_ID === "TVOJE_BIN_ID") return;
  try {
    await fetch(BIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
      body: JSON.stringify(state)
    });
  } catch {}
}

// ═══════════════════════════════════════════════════════════════════════════
const COLORS = ["#00cc65","#3b82f6","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#ec4899","#84cc16","#e2eaf2"];
const DEF = {
  tournament: { name:"", subtitle:"", date:"", venue:"", description:"" },
  teams:[], matches:[], bracket:[], scorers:[], groups:[], password:"admin"
};
const uid = () => "_" + Math.random().toString(36).substr(2,9);

function localLoad() {
  try { const s = localStorage.getItem("ft_v4"); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEF)); }
  catch { return JSON.parse(JSON.stringify(DEF)); }
}

// ── Standings per group ────────────────────────────────────────────────────
function calcGroupStandings(group, teams, matches) {
  const rows = {};
  group.teamIds.forEach(id => { rows[id] = {w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches
    .filter(m => m.played && group.teamIds.includes(m.homeId) && group.teamIds.includes(m.awayId))
    .forEach(m => {
      const h = rows[m.homeId], a = rows[m.awayId];
      if (!h || !a) return;
      const hs = Number(m.homeScore), as_ = Number(m.awayScore);
      h.gf += hs; h.ga += as_; a.gf += as_; a.ga += hs;
      if (hs > as_)       { h.w++; h.pts+=3; a.l++; }
      else if (hs < as_)  { a.w++; a.pts+=3; h.l++; }
      else                { h.d++; h.pts+=1; a.d++; a.pts+=1; }
    });
  return Object.entries(rows)
    .map(([id,s]) => ({id,...s, gd:s.gf-s.ga, played:s.w+s.d+s.l}))
    .sort((a,b) => b.pts-a.pts || (b.gd-a.gd) || (b.gf-a.gf));
}

// ── Round robin match generation ──────────────────────────────────────────
function generateMatches(group) {
  const ids = group.teamIds;
  const pairs = [];
  for (let i=0; i<ids.length; i++)
    for (let j=i+1; j<ids.length; j++) {
      pairs.push({id:uid(), round:group.name, homeId:ids[i], awayId:ids[j], homeScore:0, awayScore:0, played:false});
      if (group.schedule === "twice")
        pairs.push({id:uid(), round:group.name, homeId:ids[j], awayId:ids[i], homeScore:0, awayScore:0, played:false});
    }
  return pairs;
}

function matchCount(n, schedule) {
  return schedule === "twice" ? n*(n-1) : n*(n-1)/2;
}

// ═══════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════
const { useState, useEffect, useRef } = React;

function App() {
  const [S, setS_]      = useState(localLoad);
  const [tab, setTab]   = useState("overview");
  const [adminOpen, setAdminOpen] = useState(false);
  const [authed, setAuthed]       = useState(false);
  const [aTab, setATab]           = useState("info");
  const [pw, setPw]               = useState("");
  const [pwErr, setPwErr]         = useState(false);
  const [toast, setToast]         = useState("");
  const [toastShow, setToastShow] = useState(false);
  const [sync, setSync]           = useState("ok");
  const [selColor, setSelColor]   = useState(COLORS[0]);
  const [editMid, setEditMid]     = useState(null);
  const [editSid, setEditSid]     = useState(null);
  const [fi, setFi]   = useState({...DEF.tournament});
  const [ftname, setFtname] = useState("");
  const [fm, setFm]   = useState({round:"",homeId:"",awayId:"",s1:"",s2:"",played:false});
  const [fs, setFs]   = useState({name:"",teamId:"",goals:""});
  const [fb, setFb]   = useState({name:"",slots:"1"});
  // group form
  const [fg, setFg]   = useState({name:"", teamIds:[], schedule:"once"});
  const toastRef = useRef(null);

  // Remote load on mount
  useEffect(() => {
    if (JSONBIN_ID === "TVOJE_BIN_ID") return;
    setSync("load");
    remoteLoad().then(d => {
      if (d) { setS_(d); try { localStorage.setItem("ft_v4", JSON.stringify(d)); } catch {} }
      setSync(d ? "ok" : "err");
    });
  }, []);

  // Keyboard shortcut
  useEffect(() => {
    const h = e => {
      if (e.ctrlKey && e.shiftKey && e.key==="A") { e.preventDefault(); setAdminOpen(true); }
      if (e.key==="Escape") setAdminOpen(false);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  useEffect(() => {
    if (adminOpen && authed) setFi({...DEF.tournament,...S.tournament});
  }, [adminOpen, authed]);

  function setS(upd) {
    setS_(prev => {
      const next = typeof upd==="function" ? upd(prev) : upd;
      try { localStorage.setItem("ft_v4", JSON.stringify(next)); } catch {}
      return next;
    });
  }
  async function sync_(upd) {
    let next;
    setS_(prev => {
      next = typeof upd==="function" ? upd(prev) : upd;
      try { localStorage.setItem("ft_v4", JSON.stringify(next)); } catch {}
      return next;
    });
    if (JSONBIN_ID !== "TVOJE_BIN_ID") {
      setSync("load");
      await remoteSave(next);
      setSync("ok");
    }
  }

  function showToast(msg) {
    setToast(msg); setToastShow(true);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToastShow(false), 2400);
  }

  const T  = S.tournament;
  const gt = id => S.teams.find(t => t.id===id);
  const tn = id => { const t=gt(id); return t?t.name:"—"; };
  const played = S.matches.filter(m=>m.played).length;
  const rounds = {};
  S.matches.forEach(m => { const r=m.round||"Bez kola"; if(!rounds[r]) rounds[r]=[]; rounds[r].push(m); });
  const groups = S.groups||[];
  const scorers = [...(S.scorers||[])].sort((a,b)=>Number(b.goals)-Number(a.goals));

  // ── ADMIN ACTIONS ────────────────────────────────────────────────────────
  const checkPw = () => {
    if (pw===S.password) { setAuthed(true); setPwErr(false); setFi({...DEF.tournament,...S.tournament}); }
    else setPwErr(true);
  };
  const saveInfo = async () => { await sync_(s=>({...s,tournament:{...fi}})); showToast("Uloženo ✓"); };
  const addTeam = async () => {
    if (!ftname.trim()) return;
    await sync_(s=>({...s,teams:[...s.teams,{id:uid(),name:ftname.trim(),color:selColor}]}));
    setFtname(""); showToast("Tým přidán ✓");
  };
  const removeTeam = async id => {
    if (!confirm("Smazat tým?")) return;
    await sync_(s=>({...s,
      teams:s.teams.filter(t=>t.id!==id),
      matches:s.matches.filter(m=>m.homeId!==id&&m.awayId!==id),
      scorers:(s.scorers||[]).filter(sc=>sc.teamId!==id),
      groups:(s.groups||[]).map(g=>({...g,teamIds:g.teamIds.filter(x=>x!==id)}))
    }));
    showToast("Tým smazán");
  };
  const saveMatch = async () => {
    if (!fm.homeId||!fm.awayId) { showToast("Vyberte oba týmy"); return; }
    if (fm.homeId===fm.awayId)  { showToast("Týmy musí být různé"); return; }
    const m = {round:fm.round,homeId:fm.homeId,awayId:fm.awayId,homeScore:parseInt(fm.s1)||0,awayScore:parseInt(fm.s2)||0,played:fm.played};
    if (editMid) await sync_(s=>({...s,matches:s.matches.map(x=>x.id===editMid?{...x,...m}:x)}));
    else         await sync_(s=>({...s,matches:[...s.matches,{id:uid(),...m}]}));
    setFm({round:"",homeId:"",awayId:"",s1:"",s2:"",played:false}); setEditMid(null);
    showToast("Zápas uložen ✓");
  };
  const editMatch = id => {
    const m=S.matches.find(x=>x.id===id); if(!m) return;
    setFm({round:m.round||"",homeId:m.homeId||"",awayId:m.awayId||"",s1:m.homeScore??"",s2:m.awayScore??"",played:!!m.played});
    setEditMid(id); setATab("matches");
  };
  const removeMatch = async id => {
    if (!confirm("Smazat zápas?")) return;
    await sync_(s=>({...s,matches:s.matches.filter(m=>m.id!==id)})); showToast("Smazáno");
  };
  const saveScorer = async () => {
    if (!fs.name.trim()) { showToast("Zadej jméno"); return; }
    const entry = {name:fs.name.trim(),teamId:fs.teamId||"",goals:parseInt(fs.goals)||0};
    if (editSid) await sync_(s=>({...s,scorers:(s.scorers||[]).map(x=>x.id===editSid?{...x,...entry}:x)}));
    else         await sync_(s=>({...s,scorers:[...(s.scorers||[]),{id:uid(),...entry}]}));
    setFs({name:"",teamId:"",goals:""}); setEditSid(null); showToast("Uloženo ✓");
  };
  const editScorer = id => {
    const sc=(S.scorers||[]).find(x=>x.id===id); if(!sc) return;
    setFs({name:sc.name||"",teamId:sc.teamId||"",goals:sc.goals??""});
    setEditSid(id); setATab("scorers");
  };
  const removeScorer = async id => {
    if (!confirm("Smazat?")) return;
    await sync_(s=>({...s,scorers:(s.scorers||[]).filter(x=>x.id!==id)})); showToast("Smazáno");
  };
  // Groups
  const addGroup = async () => {
    if (!fg.name.trim())       { showToast("Zadej název skupiny"); return; }
    if (fg.teamIds.length < 2) { showToast("Vyber alespoň 2 týmy"); return; }
    const group = {id:uid(), name:fg.name.trim(), teamIds:fg.teamIds, schedule:fg.schedule};
    const newMatches = generateMatches(group);
    await sync_(s=>({...s, groups:[...(s.groups||[]),group], matches:[...s.matches,...newMatches]}));
    setFg({name:"",teamIds:[],schedule:"once"});
    showToast(`Skupina přidána, vygenerováno ${newMatches.length} zápasů ✓`);
  };
  const removeGroup = async id => {
    const g = (S.groups||[]).find(x=>x.id===id);
    if (!g) return;
    const del = confirm(`Smazat skupinu "${g.name}"?\n\nOK = smazat i vygenerované zápasy\nCancel = ponechat zápasy`);
    await sync_(s => {
      const groups = (s.groups||[]).filter(x=>x.id!==id);
      const matches = del
        ? s.matches.filter(m => !(m.round===g.name && g.teamIds.includes(m.homeId) && g.teamIds.includes(m.awayId)))
        : s.matches;
      return {...s, groups, matches};
    });
    showToast("Skupina smazána");
  };
  const toggleGroupTeam = id => {
    setFg(f => ({...f, teamIds: f.teamIds.includes(id) ? f.teamIds.filter(x=>x!==id) : [...f.teamIds,id]}));
  };
  // Bracket
  const addBracketRound = async () => {
    if (!fb.name.trim()) return;
    const slots = Array.from({length:parseInt(fb.slots)},()=>({homeId:"",awayId:"",homeScore:0,awayScore:0,played:false}));
    await sync_(s=>({...s,bracket:[...s.bracket,{id:uid(),name:fb.name.trim(),slots}]}));
    setFb({name:"",slots:"1"}); showToast("Kolo přidáno ✓");
  };
  const removeBracketRound = async rid => {
    if (!confirm("Smazat kolo?")) return;
    await sync_(s=>({...s,bracket:s.bracket.filter(r=>r.id!==rid)})); showToast("Smazáno");
  };
  const saveBracketSlot = async (rid,si,data) => {
    await sync_(s=>({...s,bracket:s.bracket.map(r=>r.id===rid
      ?{...r,slots:r.slots.map((sl,i)=>i===si?{...sl,...data}:sl)}:r)}));
    showToast("Uloženo ✓");
  };
  const changePw = async (p1,p2) => {
    if (!p1) { showToast("Zadejte heslo"); return; }
    if (p1!==p2) { showToast("Hesla se neshodují"); return; }
    await sync_(s=>({...s,password:p1})); showToast("Heslo změněno ✓");
  };
  const resetAll = () => {
    if (!confirm("Opravdu smazat vše?")) return;
    const fresh = JSON.parse(JSON.stringify(DEF));
    if (JSONBIN_ID!=="TVOJE_BIN_ID") remoteSave(fresh);
    try { localStorage.removeItem("ft_v4"); } catch {}
    setS_(fresh); setAuthed(false); setAdminOpen(false); showToast("Vše smazáno");
  };

  const TABS = [
    ["overview","Přehled"],["teams","Týmy"],["results","Výsledky"],
    ["standings","Tabulka"],["scorers","Střelci"],["bracket","Pavouk"]
  ];

  // ── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-in">
          <div className="logo" onClick={()=>setAdminOpen(true)} title="Admin (Ctrl+Shift+A)">⚽</div>
          <div className="tw">
            <h1>{T.name||"Firemní turnaj"}</h1>
            <small>{[T.subtitle,T.date,T.venue].filter(Boolean).join(" · ")||"Klikni na ⚽ pro admin"}</small>
          </div>
          <div className={`sync-dot s-${sync}`} title={sync==="ok"?"Synced":sync==="load"?"Saving...":"Offline — JSONBin?"}/>
          <nav>{TABS.map(([k,l])=>(
            <button key={k} className={`nb${tab===k?" act":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}</nav>
        </div>
      </div>

      <div className="main">

        {/* OVERVIEW */}
        {tab==="overview" && <div>
          <div className="sh"><span className="st">{T.name||"Turnaj"}</span></div>
          <div className="ov-g">
            <div className="ovc"><div className="ovl">Počet týmů</div><div className="ovv g">{S.teams.length}</div></div>
            <div className="ovc"><div className="ovl">Zápasů celkem</div><div className="ovv">{S.matches.length}</div></div>
            <div className="ovc"><div className="ovl">Odehráno</div><div className="ovv g">{played}</div></div>
            <div className="ovc"><div className="ovl">Skupin</div><div className="ovv">{groups.length}</div></div>
          </div>
          <div className="ov-desc">{T.description||"Klikni na ⚽ vlevo nahoře nebo stiskni Ctrl+Shift+A."}</div>
        </div>}

        {/* TEAMS */}
        {tab==="teams" && <div>
          <div className="sh"><span className="st">Týmy</span><span className="sbadge">{S.teams.length}</span></div>
          {!S.teams.length ? <Empty icon="👥" text="Žádné týmy."/> : (
            <div className="tg">{S.teams.map(t=>(
              <div key={t.id} className="tc">
                <div className="tbar" style={{background:t.color}}/>
                <div className="tb" style={{background:t.color}}>{t.name.substring(0,2).toUpperCase()}</div>
                <div className="tn_">{t.name}</div>
              </div>
            ))}</div>
          )}
        </div>}

        {/* RESULTS */}
        {tab==="results" && <div>
          <div className="sh"><span className="st">Výsledky</span></div>
          {!S.matches.length ? <Empty icon="📋" text="Žádné zápasy."/> :
            Object.entries(rounds).map(([r,ms])=>(
              <div key={r}>
                <div className="rl">{r}</div>
                <div className="ml">{ms.map(m=>{
                  const hw=m.played&&m.homeScore>m.awayScore, aw=m.played&&m.awayScore>m.homeScore;
                  return <div key={m.id} className="mc">
                    <div className={`mt h${hw?" w":""}`}>{tn(m.homeId)}</div>
                    <div className="msb">
                      <div className="msc">{m.played?`${m.homeScore} : ${m.awayScore}`:"vs"}</div>
                      <div className={`mst ${m.played?"sp":"su"}`}>{m.played?"Odehráno":"Plánováno"}</div>
                    </div>
                    <div className={`mt${aw?" w":""}`}>{tn(m.awayId)}</div>
                  </div>;
                })}</div>
              </div>
            ))
          }
        </div>}

        {/* STANDINGS */}
        {tab==="standings" && <div>
          <div className="sh"><span className="st">Tabulka</span></div>
          {!groups.length
            ? <Empty icon="📊" text="Nejsou definovány žádné skupiny. Přidej je v admin panelu → Skupiny."/>
            : groups.map(group => {
              const rows = calcGroupStandings(group, S.teams, S.matches);
              const totalPlayed = rows.reduce((s,r)=>s+r.played,0)/2;
              return (
                <div key={group.id} className="grp-card">
                  <div className="grp-hdr">
                    <span className="grp-name">{group.name}</span>
                    <span className="grp-meta">{group.teamIds.length} týmů · {totalPlayed} odehráno</span>
                  </div>
                  <div style={{overflowX:"auto"}}>
                    <table className="stbl">
                      <thead><tr>
                        <th style={{width:28}}>#</th>
                        <th className="left">Tým</th>
                        <th title="Odehráno">Z</th>
                        <th title="Výhry">V</th>
                        <th title="Remízy">R</th>
                        <th title="Prohry">P</th>
                        <th title="Skóre">Skóre</th>
                        <th title="Rozdíl gólů">+/−</th>
                        <th title="Body">Body</th>
                      </tr></thead>
                      <tbody>{rows.map((row,i)=>{
                        const team = gt(row.id);
                        const rc = i===0?" r1":i===1?" r2":i===2?" r3":"";
                        return <tr key={row.id}>
                          <td><span className={`rank${rc}`}>{i+1}</span></td>
                          <td className="left"><div className="trow-n">
                            {team && <span className="tdot" style={{background:team.color}}/>}
                            {team?team.name:row.id}
                          </div></td>
                          <td>{row.played}</td>
                          <td>{row.w}</td>
                          <td>{row.d}</td>
                          <td>{row.l}</td>
                          <td>{row.gf}:{row.ga}</td>
                          <td style={{color:row.gd>0?"var(--accent)":row.gd<0?"var(--red)":"var(--muted)"}}>{row.gd>0?"+":""}{row.gd}</td>
                          <td><span className="pts">{row.pts}</span></td>
                        </tr>;
                      })}</tbody>
                    </table>
                  </div>
                </div>
              );
            })
          }
        </div>}

        {/* SCORERS */}
        {tab==="scorers" && <div>
          <div className="sh"><span className="st">Střelci</span><span className="sbadge">{scorers.length}</span></div>
          {!scorers.length ? <Empty icon="⚽" text="Žádní střelci."/> : (
            <div className="scr-card">
              <table className="scr-tbl">
                <thead><tr>
                  <th style={{width:36,textAlign:"center"}}>#</th>
                  <th>Hráč</th><th>Tým</th>
                  <th className="c">Góly</th>
                </tr></thead>
                <tbody>{scorers.map((sc,i)=>{
                  const team=gt(sc.teamId);
                  const rc=i===0?" r1":i===1?" r2":i===2?" r3":"";
                  return <tr key={sc.id}>
                    <td style={{textAlign:"center"}}><span className={`scr-rank${rc}`}>{i+1}</span></td>
                    <td><div className="scr-name">{sc.name}</div></td>
                    <td>{team?<div style={{display:"flex",alignItems:"center",gap:5}}><span className="tdot" style={{background:team.color}}/><span className="scr-team">{team.name}</span></div>:<span className="scr-team">—</span>}</td>
                    <td className="c"><span style={{fontSize:".8rem",opacity:.6}}>⚽ </span><span className="scr-goals">{sc.goals}</span></td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          )}
        </div>}

        {/* BRACKET */}
        {tab==="bracket" && <div>
          <div className="sh"><span className="st">Pavouk</span></div>
          {!S.bracket.length ? <Empty icon="🏆" text="Pavouk není nastaven."/> : (
            <div className="bkw"><div className="bk">
              {S.bracket.map((round,ri)=>{
                const UNIT=90, slotH=UNIT*Math.pow(2,ri), isFinal=ri===S.bracket.length-1;
                return (
                  <React.Fragment key={round.id}>
                    <div className="bkr">
                      <div className="bkrh">{round.name}</div>
                      <div className="bksl">
                        {round.slots.map((slot,si)=>{
                          const hw=slot.played&&Number(slot.homeScore)>Number(slot.awayScore);
                          const aw=slot.played&&Number(slot.awayScore)>Number(slot.homeScore);
                          const hT=gt(slot.homeId), aT=gt(slot.awayId);
                          return <div key={si} className="bksl_" style={{height:slotH}}>
                            <div className={`bkm${isFinal?" fin":""}`}>
                              <div className={`bkt${hw?(isFinal?" bkwf":" bkw_"):""}`}>
                                <span className={!hT?"bktbd":""}>{hT?hT.name:"TBD"}</span>
                                <span className="bksc">{slot.played?slot.homeScore:""}</span>
                              </div>
                              <div className={`bkt${aw?(isFinal?" bkwf":" bkw_"):""}`}>
                                <span className={!aT?"bktbd":""}>{aT?aT.name:"TBD"}</span>
                                <span className="bksc">{slot.played?slot.awayScore:""}</span>
                              </div>
                            </div>
                          </div>;
                        })}
                      </div>
                    </div>
                    {ri<S.bracket.length-1 && (
                      <div className="bkconn" style={{minHeight:slotH*round.slots.length,paddingTop:"calc(.65rem + 1px)"}}>
                        {Array.from({length:Math.ceil(round.slots.length/2)},(_,p)=>(
                          <div key={p} className="bkcp" style={{height:slotH*2}}>
                            <div className="bkcs" style={{height:"50%"}}/>
                            <div className="bkcs" style={{height:"50%"}}/>
                          </div>
                        ))}
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div></div>
          )}
        </div>}

      </div>

      {/* ── ADMIN OVERLAY ─────────────────────────────────────────────────── */}
      {adminOpen && (
        <div className="aov" onClick={e=>e.target===e.currentTarget&&setAdminOpen(false)}>
          <div className="apanel">
            <div className="aphdr">
              <span>⚽</span><h2>Admin panel</h2>
              <span className="abadge">Správce</span>
              <button className="acls" onClick={()=>setAdminOpen(false)}>✕ Zavřít</button>
            </div>

            {!authed ? (
              <div className="alogin">
                <h3>Přihlášení</h3>
                <p style={{fontSize:".8rem",color:"var(--muted)"}}>Výchozí heslo: <strong>admin</strong></p>
                <div className="fg">
                  <label className="fl">Heslo</label>
                  <input className="fi" type="password" value={pw} onChange={e=>setPw(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&checkPw()} autoFocus/>
                </div>
                <button className="btn bp bfull" onClick={checkPw}>Přihlásit</button>
                {pwErr && <p style={{color:"var(--red)",fontSize:".76rem"}}>Špatné heslo.</p>}
              </div>
            ) : (
              <>
                <div className="atabs">
                  {[["info","Info"],["teams","Týmy"],["groups","Skupiny"],
                    ["matches","Zápasy"],["scorers","Střelci"],["bracket","Pavouk"],["settings","Nastavení"]].map(([k,l])=>(
                    <button key={k} className={`atab${aTab===k?" act":""}`} onClick={()=>setATab(k)}>{l}</button>
                  ))}
                </div>
                <div className="abody">

                  {/* ── INFO ─── */}
                  {aTab==="info" && <div>
                    <div className="fg"><label className="fl">Název turnaje</label>
                      <input className="fi" value={fi.name} onChange={e=>setFi(f=>({...f,name:e.target.value}))} placeholder="Firemní fotbalový turnaj"/></div>
                    <div className="fg"><label className="fl">Podnázev / rok</label>
                      <input className="fi" value={fi.subtitle} onChange={e=>setFi(f=>({...f,subtitle:e.target.value}))} placeholder="2025"/></div>
                    <div className="fr">
                      <div className="fg"><label className="fl">Datum</label>
                        <input className="fi" value={fi.date} onChange={e=>setFi(f=>({...f,date:e.target.value}))} placeholder="15. 6. 2025"/></div>
                      <div className="fg"><label className="fl">Místo</label>
                        <input className="fi" value={fi.venue} onChange={e=>setFi(f=>({...f,venue:e.target.value}))} placeholder="Sportovní hala"/></div>
                    </div>
                    <div className="fg"><label className="fl">Popis</label>
                      <textarea className="fta" value={fi.description} onChange={e=>setFi(f=>({...f,description:e.target.value}))} placeholder="Stručný popis turnaje..."/></div>
                    <button className="btn bp bfull" onClick={saveInfo}>💾 Uložit</button>
                  </div>}

                  {/* ── TEAMS ─── */}
                  {aTab==="teams" && <div>
                    <div className="ss">Přidat tým</div>
                    <div className="fg"><label className="fl">Název týmu</label>
                      <input className="fi" value={ftname} onChange={e=>setFtname(e.target.value)}
                        onKeyDown={e=>e.key==="Enter"&&addTeam()} placeholder="Název týmu"/></div>
                    <div className="fg"><label className="fl">Barva</label>
                      <div className="colors">{COLORS.map(c=>(
                        <div key={c} className={`csw${selColor===c?" sel":""}`} style={{background:c}} onClick={()=>setSelColor(c)}/>
                      ))}</div>
                    </div>
                    <button className="btn bp" onClick={addTeam}>+ Přidat tým</button>
                    <hr className="div"/>
                    <div className="ss">Týmy</div>
                    {!S.teams.length ? <p style={{fontSize:".76rem",color:"var(--muted)"}}>Žádné týmy.</p> : (
                      <div className="alist">{S.teams.map(t=>(
                        <div key={t.id} className="ai">
                          <div className="adot" style={{background:t.color}}/>
                          <div className="ain">{t.name}</div>
                          <button className="btn bg_ bsm" onClick={()=>removeTeam(t.id)}>Smazat</button>
                        </div>
                      ))}</div>
                    )}
                  </div>}

                  {/* ── GROUPS ─── */}
                  {aTab==="groups" && <div>
                    {!S.teams.length && (
                      <div className="warn-box"><strong>Nejsou žádné týmy.</strong> Nejprve přidej týmy v záložce Týmy.</div>
                    )}
                    <div className="ss">Vytvořit skupinu</div>
                    <div className="fg"><label className="fl">Název skupiny</label>
                      <input className="fi" value={fg.name} onChange={e=>setFg(f=>({...f,name:e.target.value}))} placeholder="Skupina A, Skupina B..."/></div>
                    <div className="fg">
                      <label className="fl">Týmy ve skupině</label>
                      <div className="chk-list">
                        {!S.teams.length
                          ? <span style={{fontSize:".76rem",color:"var(--muted)"}}>Nejsou týmy.</span>
                          : S.teams.map(t=>(
                          <div key={t.id} className="chk-item" onClick={()=>toggleGroupTeam(t.id)}>
                            <input type="checkbox" readOnly checked={fg.teamIds.includes(t.id)} style={{accentColor:"var(--accent)"}}/>
                            <label>
                              <span className="tdot" style={{background:t.color}}/>
                              {t.name}
                            </label>
                          </div>
                        ))}
                      </div>
                      {fg.teamIds.length >= 2 && (
                        <div className="gen-preview">
                          ✓ {fg.teamIds.length} týmů → vygeneruje {matchCount(fg.teamIds.length, fg.schedule)} zápasů
                        </div>
                      )}
                    </div>
                    <div className="fg">
                      <label className="fl">Systém odehrání</label>
                      <div className="radio-row">
                        <div className="radio-item" onClick={()=>setFg(f=>({...f,schedule:"once"}))}>
                          <input type="radio" readOnly checked={fg.schedule==="once"}/>
                          <label>Každý s každým jednou</label>
                        </div>
                        <div className="radio-item" onClick={()=>setFg(f=>({...f,schedule:"twice"}))}>
                          <input type="radio" readOnly checked={fg.schedule==="twice"}/>
                          <label>Každý s každým dvakrát</label>
                        </div>
                      </div>
                    </div>
                    <button className="btn bp" onClick={addGroup}>⚡ Vytvořit skupinu a generovat zápasy</button>
                    <hr className="div"/>
                    <div className="ss">Existující skupiny</div>
                    {!groups.length
                      ? <p style={{fontSize:".76rem",color:"var(--muted)"}}>Žádné skupiny.</p>
                      : groups.map(g=>{
                        const cnt = S.matches.filter(m=>g.teamIds.includes(m.homeId)&&g.teamIds.includes(m.awayId)).length;
                        const playedCnt = S.matches.filter(m=>m.played&&g.teamIds.includes(m.homeId)&&g.teamIds.includes(m.awayId)).length;
                        return (
                          <div key={g.id} className="grp-admin-card">
                            <div className="grp-admin-hdr">
                              <span className="grp-admin-name">{g.name}</span>
                              <button className="btn bg_ bsm" onClick={()=>removeGroup(g.id)}>Smazat</button>
                            </div>
                            <div className="grp-admin-sub">
                              {g.teamIds.length} týmů · {cnt} zápasů ({playedCnt} odehráno) · {g.schedule==="twice"?"2× každý s každým":"1× každý s každým"}
                            </div>
                            <div style={{marginTop:".45rem",display:"flex",flexWrap:"wrap",gap:4}}>
                              {g.teamIds.map(id=>{const t=gt(id);return t?(
                                <span key={id} style={{fontSize:".7rem",background:"var(--card2)",border:"1px solid var(--border)",borderRadius:4,padding:"1px 7px",display:"flex",alignItems:"center",gap:4}}>
                                  <span className="tdot" style={{background:t.color,margin:0}}/>
                                  {t.name}
                                </span>
                              ):null;})}
                            </div>
                          </div>
                        );
                      })
                    }
                  </div>}

                  {/* ── MATCHES ─── */}
                  {aTab==="matches" && <div>
                    <div className="ss">{editMid?"Upravit zápas":"Přidat zápas"}</div>
                    <div className="fg"><label className="fl">Kolo / skupina</label>
                      <input className="fi" value={fm.round} onChange={e=>setFm(f=>({...f,round:e.target.value}))} placeholder="Skupina A, Semifinále..."/></div>
                    <div className="fr">
                      <div className="fg"><label className="fl">Domácí tým</label>
                        <select className="fi fsel" value={fm.homeId} onChange={e=>setFm(f=>({...f,homeId:e.target.value}))}>
                          <option value="">— Vyberte —</option>
                          {S.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                        </select></div>
                      <div className="fg"><label className="fl">Hostující tým</label>
                        <select className="fi fsel" value={fm.awayId} onChange={e=>setFm(f=>({...f,awayId:e.target.value}))}>
                          <option value="">— Vyberte —</option>
                          {S.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                        </select></div>
                    </div>
                    <div className="fr3">
                      <div className="fg"><label className="fl">Skóre (domácí)</label>
                        <input className="fi" type="number" min="0" value={fm.s1} onChange={e=>setFm(f=>({...f,s1:e.target.value}))} placeholder="0"/></div>
                      <div className="ssep">:</div>
                      <div className="fg"><label className="fl">Skóre (hosté)</label>
                        <input className="fi" type="number" min="0" value={fm.s2} onChange={e=>setFm(f=>({...f,s2:e.target.value}))} placeholder="0"/></div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem"}}>
                      <input type="checkbox" id="mpl" checked={fm.played} onChange={e=>setFm(f=>({...f,played:e.target.checked}))} style={{accentColor:"var(--accent)",width:14,height:14}}/>
                      <label htmlFor="mpl" style={{fontSize:".82rem",cursor:"pointer"}}>Zápas odehrán</label>
                    </div>
                    <div className="brow">
                      <button className="btn bp" onClick={saveMatch}>+ Uložit zápas</button>
                      {editMid && <button className="btn bg_ bsm" onClick={()=>{setEditMid(null);setFm({round:"",homeId:"",awayId:"",s1:"",s2:"",played:false});}}>✕ Zrušit</button>}
                    </div>
                    <hr className="div"/>
                    <div className="ss">Přehled zápasů</div>
                    {!S.matches.length ? <p style={{fontSize:".76rem",color:"var(--muted)"}}>Žádné zápasy.</p> : (
                      <div className="alist">{S.matches.map(m=>(
                        <div key={m.id} className="ai">
                          <div style={{flex:1}}>
                            <div className="ain">{tn(m.homeId)} vs {tn(m.awayId)}</div>
                            <div className="asub">{m.round||"—"} · {m.played?`${m.homeScore}:${m.awayScore}`:"Plánováno"}</div>
                          </div>
                          <button className="btn bg_ bsm" onClick={()=>editMatch(m.id)}>Upravit</button>
                          <button className="btn bg_ bsm" onClick={()=>removeMatch(m.id)}>Smazat</button>
                        </div>
                      ))}</div>
                    )}
                  </div>}

                  {/* ── SCORERS ─── */}
                  {aTab==="scorers" && <div>
                    <div className="ss">{editSid?"Upravit střelce":"Přidat střelce"}</div>
                    <div className="fg"><label className="fl">Jméno hráče</label>
                      <input className="fi" value={fs.name} onChange={e=>setFs(f=>({...f,name:e.target.value}))} placeholder="Jan Novák"/></div>
                    <div className="fr">
                      <div className="fg"><label className="fl">Tým</label>
                        <select className="fi fsel" value={fs.teamId} onChange={e=>setFs(f=>({...f,teamId:e.target.value}))}>
                          <option value="">— Bez týmu —</option>
                          {S.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                        </select></div>
                      <div className="fg"><label className="fl">Počet gólů</label>
                        <input className="fi" type="number" min="0" value={fs.goals} onChange={e=>setFs(f=>({...f,goals:e.target.value}))} placeholder="0"/></div>
                    </div>
                    <div className="brow">
                      <button className="btn bp" onClick={saveScorer}>+ Uložit střelce</button>
                      {editSid && <button className="btn bg_ bsm" onClick={()=>{setEditSid(null);setFs({name:"",teamId:"",goals:""});}}>✕ Zrušit</button>}
                    </div>
                    <hr className="div"/>
                    <div className="ss">Přehled střelců</div>
                    {!scorers.length ? <p style={{fontSize:".76rem",color:"var(--muted)"}}>Žádní střelci.</p> : (
                      <div className="alist">{scorers.map(sc=>(
                        <div key={sc.id} className="ai">
                          <div style={{flex:1}}>
                            <div className="ain">{sc.name}</div>
                            <div className="asub">{tn(sc.teamId)} · {sc.goals} gólů</div>
                          </div>
                          <button className="btn bg_ bsm" onClick={()=>editScorer(sc.id)}>Upravit</button>
                          <button className="btn bg_ bsm" onClick={()=>removeScorer(sc.id)}>Smazat</button>
                        </div>
                      ))}</div>
                    )}
                  </div>}

                  {/* ── BRACKET ─── */}
                  {aTab==="bracket" && <div>
                    <p style={{fontSize:".79rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:1.6}}>
                      Přidávej kola v pořadí: Čtvrtfinále → Semifinále → Finále.</p>
                    <div className="ss">Přidat kolo</div>
                    <div className="fg"><label className="fl">Název kola</label>
                      <input className="fi" value={fb.name} onChange={e=>setFb(f=>({...f,name:e.target.value}))} placeholder="Semifinále, Finále..."/></div>
                    <div className="fg"><label className="fl">Počet zápasů</label>
                      <select className="fi fsel" value={fb.slots} onChange={e=>setFb(f=>({...f,slots:e.target.value}))}>
                        <option value="1">1 zápas (Finále)</option>
                        <option value="2">2 zápasy (Semifinále)</option>
                        <option value="4">4 zápasy (Čtvrtfinále)</option>
                        <option value="8">8 zápasů</option>
                      </select></div>
                    <button className="btn bs" onClick={addBracketRound}>+ Přidat kolo</button>
                    <hr className="div"/>
                    {!S.bracket.length ? <p style={{fontSize:".76rem",color:"var(--muted)"}}>Žádná kola.</p> :
                      S.bracket.map(round=>(
                        <BracketAdmin key={round.id} round={round} teams={S.teams}
                          onSave={(si,d)=>saveBracketSlot(round.id,si,d)}
                          onRemove={()=>removeBracketRound(round.id)}/>
                      ))
                    }
                  </div>}

                  {/* ── SETTINGS ─── */}
                  {aTab==="settings" && <SettingsTab configured={JSONBIN_ID!=="TVOJE_BIN_ID"} onPw={changePw} onReset={resetAll}/>}

                </div>
              </>
            )}
          </div>
        </div>
      )}

      <div className="toast-wrap">
        <div className={`toast_${toastShow?" show":""}`}>{toast}</div>
      </div>
    </div>
  );
}

function Empty({icon,text}) {
  return <div className="empty"><div className="eic">{icon}</div><div className="etx">{text}</div></div>;
}

function BracketAdmin({round, teams, onSave, onRemove}) {
  const [slots, setSlots] = useState(round.slots.map(s=>({...s})));
  const upd = (si,f,v) => setSlots(s=>s.map((sl,i)=>i===si?{...sl,[f]:v}:sl));
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:".85rem .95rem",marginBottom:".65rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:".65rem",marginBottom:".55rem"}}>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",letterSpacing:".06em",flex:1}}>{round.name}</span>
        <button className="btn bg_ bsm" onClick={onRemove}>Smazat kolo</button>
      </div>
      {slots.map((slot,si)=>(
        <div key={si} style={{borderTop:"1px solid var(--border)",paddingTop:".55rem",marginTop:".55rem"}}>
          <div style={{fontSize:".63rem",color:"var(--dim)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".38rem"}}>Zápas {si+1}</div>
          <div className="fr" style={{marginBottom:".32rem"}}>
            <select className="fi fsel" style={{fontSize:".78rem"}} value={slot.homeId} onChange={e=>upd(si,"homeId",e.target.value)}>
              <option value="">TBD</option>
              {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
            <select className="fi fsel" style={{fontSize:".78rem"}} value={slot.awayId} onChange={e=>upd(si,"awayId",e.target.value)}>
              <option value="">TBD</option>
              {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <div className="fr3" style={{marginBottom:".32rem"}}>
            <input className="fi" type="number" min="0" style={{fontSize:".78rem"}} value={slot.homeScore} onChange={e=>upd(si,"homeScore",parseInt(e.target.value)||0)}/>
            <div className="ssep">:</div>
            <input className="fi" type="number" min="0" style={{fontSize:".78rem"}} value={slot.awayScore} onChange={e=>upd(si,"awayScore",parseInt(e.target.value)||0)}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:".42rem",marginBottom:".35rem"}}>
            <input type="checkbox" checked={slot.played} onChange={e=>upd(si,"played",e.target.checked)} style={{accentColor:"var(--accent)"}}/>
            <span style={{fontSize:".78rem",cursor:"pointer"}}>Odehráno</span>
          </div>
          <button className="btn bs bsm" onClick={()=>onSave(si,slots[si])}>💾 Uložit</button>
        </div>
      ))}
    </div>
  );
}

function SettingsTab({configured, onPw, onReset}) {
  const [p1,setP1]=useState(""), [p2,setP2]=useState("");
  return (
    <div>
      {!configured && (
        <div className="info-box">
          <strong>JSONBin není nakonfigurován.</strong><br/>
          1. Účet na <strong>jsonbin.io</strong> (zdarma)<br/>
          2. Create Bin → vlož <code>{"{}"}</code> → ulož → zkopíruj ID<br/>
          3. Account → API Keys → Master Key<br/>
          4. V HTML souboru nahraď <code>TVOJE_BIN_ID</code> a <code>TVUJ_API_KEY</code><br/>
          Momentálně se data ukládají pouze lokálně v tomto prohlížeči.
        </div>
      )}
      <div className="ss">Změna hesla</div>
      <div className="fg"><label className="fl">Nové heslo</label>
        <input className="fi" type="password" value={p1} onChange={e=>setP1(e.target.value)} placeholder="Nové heslo"/></div>
      <div className="fg"><label className="fl">Potvrdit</label>
        <input className="fi" type="password" value={p2} onChange={e=>setP2(e.target.value)} placeholder="Znovu nové heslo"/></div>
      <button className="btn bs" onClick={()=>onPw(p1,p2)}>Změnit heslo</button>
      <hr className="div"/>
      <div className="ss">Nebezpečná zóna</div>
      <p style={{fontSize:".76rem",color:"var(--muted)",marginBottom:".65rem"}}>Smaže veškerá data nevratně.</p>
      <button className="btn bg_" style={{border:"1px solid var(--border2)"}} onClick={onReset}>🗑 Vymazat vše</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
